name: Build & Test Workflow

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # MAUI: only the net10.0 TFM is built on Linux CI.
      - name: Restore workloads
        run: dotnet workload restore StarterApp/StarterApp.csproj

      - name: Restore dependencies
        run: dotnet restore StarterApp.sln

      - name: Build solution (app, DB, migrations, test projects)
        env:
          ConnectionStrings__TestConnection: ${{ secrets.TestConnection_CONNECTION_STRING }}
        run: dotnet build StarterApp.sln -c Release -f net10.0 --no-restore

      # Runs StarterApp.Test (Postgres via embedded TestConnection; overridden in CI by ConnectionStrings__TestConnection during build when set).
      # Use Host=postgres in the secret (service container hostname). Fallback supports forks without secrets.
      - name: Run tests — StarterApp.sln
        env:
          ConnectionStrings__TestConnection: ${{ secrets.TestConnection_CONNECTION_STRING }}
        run: |
          if [ -z "$ConnectionStrings__TestConnection" ]; then
            export ConnectionStrings__TestConnection='Host=postgres;Port=5432;Username=test_user;Password=test_password;Database=testdb'
          fi
          dotnet test StarterApp.sln -c Release -f net10.0 --no-build
