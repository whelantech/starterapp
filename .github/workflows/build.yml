name: Build & Test Workflow

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      # Align with SonarQube Cloud snippet: JDK before checkout is fine on hosted runners.
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: "17"
          distribution: zulu

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # MAUI: only the net10.0 TFM is built on Linux CI.
      - name: Restore workloads
        run: dotnet workload restore StarterApp/StarterApp.csproj

      - name: Restore dependencies
        run: dotnet restore StarterApp.sln

      - name: Install Tools
        run: dotnet tool install --global dotnet-coverage

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}/scanner"
          dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}/scanner"

      # Token: repository secret SONAR_TOKEN only (SonarQube Cloud → My Account → Security).
      # Project/org keys match SonarCloud onboarding for this repo.
      - name: Start Sonar Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          "${{ runner.temp }}/scanner/dotnet-sonarscanner" begin \
            /k:"whelantech_starterapp" \
            /o:"whelantech" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.scanner.scanAll=false \
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml

      - name: Build solution (app, DB, migrations, test projects)
        env:
          ConnectionStrings__TestConnection: ${{ secrets.TestConnection_CONNECTION_STRING }}
        run: dotnet build StarterApp.sln -c Release -f net10.0 --no-restore

      - name: Run tests — StarterApp.sln
        env:
          ConnectionStrings__TestConnection: ${{ secrets.TestConnection_CONNECTION_STRING }}
        run: |
          if [ -z "$ConnectionStrings__TestConnection" ]; then
            export ConnectionStrings__TestConnection='Host=postgres;Port=5432;Username=test_user;Password=test_password;Database=testdb'
          fi
          dotnet-coverage collect "dotnet test StarterApp.sln -c Release -f net10.0 --no-build" -f xml -o "coverage.xml"

      - name: End Sonar Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          "${{ runner.temp }}/scanner/dotnet-sonarscanner" end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
