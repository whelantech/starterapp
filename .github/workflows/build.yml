name: Build & Test Workflow

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
       postgres:
         image: postgres:16
         env:
         ConnectionStrings__TestConnection: ${{ secrets.TestConnection_CONNECTION_STRING }}
           POSTGRES_USER: test_user
           POSTGRES_PASSWORD: test_password
           POSTGRES_DB: testdb
         options: >-
           --health-cmd pg_isready
           --health-interval 10s
           --health-timeout 5s
           --health-retries 5
         ports:
           - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore workloads
        run: dotnet workload restore ${{ vars.CSPROJ_PATH }}
      - name: Restore Dependencies
        run: dotnet restore ${{ vars.CSPROJ_PATH }}
      - name: Build Project
        run: dotnet build ${{ vars.CSPROJ_PATH }} -c Release --no-restore
      - name: Run Tests
        env: 
        ConnectionStrings__TestConnection: ${{ secrets.TestConnection_CONNECTION_STRING }}
        run: dotnet test ./RentalApp.Test/RentalApp.Test.csproj -c Release --no-build


