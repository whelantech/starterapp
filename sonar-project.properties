# SonarCloud — loaded automatically by SonarScanner for .NET from the repository root.
# Use with: dotnet sonarscanner begin … (token/host on CI), build, test + Coverlet OpenCover, end.

sonar.projectKey=whelantech_starterapp
sonar.organization=whelantech

# Limit analysis to production + test projects (match this repo, not the coursework RentalApp names).
sonar.sources=StarterApp,StarterApp.Database
sonar.tests=StarterApp.Test

sonar.sourceEncoding=UTF-8

# Align with dotnet-sonarscanner begin /d:sonar.scanner.scanAll=false
sonar.scanner.scanAll=false

# Coverlet collector writes OpenCover XML under TestResults/** (see workflow test step).
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Boilerplate / generated — keep metrics on meaningful code
sonar.exclusions=**/Platforms/**,**/Resources/**,**/StarterApp.Migrations/**

# Do not count test files toward “coverage %” denominators the way coursework snippets suggest
sonar.coverage.exclusions=**/StarterApp.Test/**,**/*Tests.cs
